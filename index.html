<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Chest Chance Calculator</title>
  <style>
    :root {
      --bg: #0b0f14;
      --panel: #111823;
      --text: #e6eef8;
      --muted: #9db0c8;
      --input: #0f1622;
      --border: #223047;

      --gold: #f6c453;
      --shiny: #a7b0bb;
      --rainbow: #ff6ad5;
      --void: #7a4bff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(1200px 600px at 20% -10%, #1a2440 0%, #0b0f14 50%, #090c10 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 16px;
    }

    .card {
      width: 100%;
      max-width: 1100px;
      background: linear-gradient(180deg, #121a26 0%, #0f1622 100%);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 1.8rem;
      letter-spacing: 0.3px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      color: var(--text);
    }

    .input-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    input, select {
      background: var(--input);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 12px;
      font-size: 1rem;
      border-radius: 10px;
      width: 220px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 14px;
    }

    .box {
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      min-height: 96px;
    }

    .box .title {
      font-size: 0.95rem;
      color: var(--muted);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .box .value {
      font-size: 1.6rem;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gold { border-color: var(--gold); box-shadow: 0 0 0 1px rgba(246,196,83,0.25), 0 0 12px rgba(246,196,83,0.25); }
    .shiny { border-color: var(--shiny); box-shadow: 0 0 0 1px rgba(167,176,187,0.2); }
    .rainbow { border-color: var(--rainbow); box-shadow: 0 0 0 1px rgba(255,106,213,0.25), 0 0 12px rgba(255,106,213,0.25); }
    .void { border-color: var(--void); box-shadow: 0 0 0 1px rgba(122,75,255,0.25), 0 0 12px rgba(122,75,255,0.25); }

    .note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .note strong { color: #ffffff; }

    .split {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 18px;
    }

    .section-title {
      font-size: 1.05rem;
      font-weight: 700;
      margin: 0 0 10px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Chest Chance Calculator</h1>

    <div class="split">
      <section>
        <div class="section-title">At Least One Chest</div>
        <div class="input-row">
          <div>
            <label for="difficulty">Difficulty</label>
            <select id="difficulty">
              <option value="easy">Easy</option>
              <option value="medium">Medium</option>
              <option value="hard">Hard</option>
              <option value="impossible">Impossible</option>
            </select>
          </div>
          <div>
            <label for="runs">Number of runs</label>
            <input id="runs" type="number" min="0" value="0" />
          </div>
        </div>

        <div class="grid" id="output"></div>

        <div class="note">Formula: 1 - (1 - p)^n</div>
        <div class="note"><strong>*NOTE This is just a Probability Calculator and no Chances are 100% guarantee</strong></div>
      </section>

      <section>
        <div class="section-title">Time to Complete Runs</div>
        <div class="input-row">
          <div>
            <label for="runsTime">Number of runs</label>
            <input id="runsTime" type="number" min="0" value="0" />
          </div>
        </div>

        <div class="grid" id="timeOutput">
          <div class="box shiny">
            <div class="title">Estimated Time</div>
            <div class="value">0 minutes</div>
          </div>
        </div>

        <div class="note">Assumes 1 run every 15 minutes (4 per hour, 96 per day).</div>
      </section>
    </div>
  </div>

  <script>
    const difficultyData = {
      easy:   { gold: 0.85,  shiny: 0.15 },
      medium: { gold: 0.75,  shiny: 0.23, rainbow: 0.02 },
      hard:   { gold: 0.60,  shiny: 0.30, rainbow: 0.099, void: 0.001 },
      impossible: { shiny: 0.75, rainbow: 0.245, void: 0.005 }
    };

    function atLeastOne(p, n) {
      return 1 - Math.pow(1 - p, n);
    }

    function makeBox(type, label, valueText) {
      return `
        <div class="box ${type}">
          <div class="title">${label}</div>
          <div class="value">${valueText}</div>
        </div>
      `;
    }

    function update() {
      const n = Math.max(0, Number(document.getElementById("runs").value || 0));
      const diff = document.getElementById("difficulty").value;
      const probs = difficultyData[diff];

      const boxes = [];

      if (probs.gold !== undefined) {
        boxes.push(makeBox("gold", "Gold", `${(atLeastOne(probs.gold, n) * 100).toFixed(6)}%`));
      }

      boxes.push(makeBox("shiny", "Shiny", `${(atLeastOne(probs.shiny, n) * 100).toFixed(6)}%`));

      if (probs.rainbow !== undefined) {
        boxes.push(makeBox("rainbow", "Rainbow", `${(atLeastOne(probs.rainbow, n) * 100).toFixed(6)}%`));
      }

      if (probs.void !== undefined) {
        boxes.push(makeBox("void", "Void", `${(atLeastOne(probs.void, n) * 100).toFixed(6)}%`));
      }

      document.getElementById("output").innerHTML = boxes.join("");
    }

    function formatDuration(totalMinutes) {
      let minutes = Math.max(0, Math.floor(totalMinutes));
      const weeks = Math.floor(minutes / (7 * 24 * 60));
      minutes -= weeks * 7 * 24 * 60;
      const days = Math.floor(minutes / (24 * 60));
      minutes -= days * 24 * 60;
      const hours = Math.floor(minutes / 60);
      minutes -= hours * 60;

      const parts = [];
      if (weeks > 0) parts.push(`${weeks} week${weeks === 1 ? "" : "s"}`);
      if (days > 0) parts.push(`${days} day${days === 1 ? "" : "s"}`);
      if (hours > 0) parts.push(`${hours} hour${hours === 1 ? "" : "s"}`);
      if (minutes > 0 || parts.length === 0) parts.push(`${minutes} minute${minutes === 1 ? "" : "s"}`);
      return parts.join(", ");
    }

    function updateTime() {
      const n = Math.max(0, Number(document.getElementById("runsTime").value || 0));
      const totalMinutes = n * 15;
      const timeBox = document.querySelector("#timeOutput .box .value");
      timeBox.textContent = formatDuration(totalMinutes);
    }

    document.getElementById("runs").addEventListener("input", update);
    document.getElementById("difficulty").addEventListener("change", update);
    document.getElementById("runsTime").addEventListener("input", updateTime);

    update();
    updateTime();
  </script>
</body>
</html>
